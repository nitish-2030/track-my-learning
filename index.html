<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LearnFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root[data-theme="dark"] {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #181c24;
    --border: #1e2330;
    --text: #eceef5;
    --muted: #5a6480;
    --cyan: #00d4ff;
    --cyan-dim: rgba(0,212,255,0.12);
    --green: #00e676;
    --green-dim: rgba(0,230,118,0.12);
    --orange: #ff9800;
    --orange-dim: rgba(255,152,0,0.12);
    --red: #ff4757;
    --card-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  :root[data-theme="light"] {
    --bg: #eef0f7;
    --surface: #ffffff;
    --surface2: #f5f6fb;
    --border: #dde1f0;
    --text: #141728;
    --muted: #7b87a8;
    --cyan: #0077bb;
    --cyan-dim: rgba(0,119,187,0.1);
    --green: #009955;
    --green-dim: rgba(0,153,85,0.1);
    --orange: #d46b00;
    --orange-dim: rgba(212,107,0,0.1);
    --red: #d93025;
    --card-shadow: 0 2px 16px rgba(0,0,0,0.07);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html { font-size: 16px; }
  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
    -webkit-font-smoothing: antialiased;
  }

  /* ── TOPBAR ───────────────────────────────── */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky; top:0; z-index:100;
    background: var(--bg);
  }
  .logo {
    font-family:'Syne', sans-serif;
    font-size: 1.25rem; font-weight:800;
    color:var(--cyan); letter-spacing:1px;
  }
  .logo span { color:var(--text); }
  .topbar-right { display:flex; align-items:center; gap:10px; }
  .streak-pill {
    display:flex; align-items:center; gap:5px;
    background:var(--orange-dim); border:1.5px solid var(--orange);
    border-radius:20px; padding:5px 13px;
    font-size: .95rem; color:var(--orange); font-weight:700;
  }
  .theme-btn {
    background: var(--surface2); border:1.5px solid var(--border);
    color:var(--text); border-radius:50%; width:40px; height:40px;
    cursor:pointer; font-size:1.1rem; transition:.2s;
    display:flex; align-items:center; justify-content:center;
  }
  .theme-btn:hover { border-color:var(--cyan); }

  /* ── MAIN ─────────────────────────────────── */
  .main {
    max-width: 680px; margin:0 auto;
    padding: 18px 14px 110px;
    display:flex; flex-direction:column; gap:14px;
  }

  /* ── CARDS ────────────────────────────────── */
  .card {
    background:var(--surface); border:1.5px solid var(--border);
    border-radius:18px; padding:18px 16px;
    box-shadow: var(--card-shadow);
    transition: border-color .2s;
  }
  .card-label {
    font-family:'Outfit', sans-serif;
    font-size: .75rem; font-weight:700;
    color:var(--muted); letter-spacing:1.5px; text-transform:uppercase;
    margin-bottom:14px; display:flex; align-items:center; gap:8px;
  }
  .card-label .dot { width:7px; height:7px; border-radius:50%; background:var(--cyan); flex-shrink:0; }
  .card-label .dot.green { background:var(--green); }
  .card-label .dot.orange { background:var(--orange); }

  /* ── PROGRESS BAR ─────────────────────────── */
  .progress-wrap { margin-top:12px; }
  .progress-track { height:7px; background:var(--border); border-radius:10px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--cyan),var(--green)); border-radius:10px; transition:width .6s cubic-bezier(.4,0,.2,1); }

  /* ── TOPIC LIST ───────────────────────────── */
  .topic-list { display:flex; flex-direction:column; gap:9px; margin-top:13px; }
  .topic-item {
    display:flex; align-items:center; gap:13px;
    background:var(--surface2); border:1.5px solid var(--border);
    border-radius:12px; padding:14px 15px;
    transition:.2s; cursor:pointer; user-select:none;
    min-height: 52px;
  }
  .topic-item:active { transform:scale(.98); }
  .topic-item:hover { border-color:var(--cyan); }
  .topic-item.done { opacity:.45; }
  .topic-item.done .topic-name { text-decoration:line-through; }
  .topic-check {
    width:24px; height:24px; border-radius:7px; border:2px solid var(--muted);
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; font-size:.85rem; transition:.2s;
    background: transparent;
  }
  .topic-item.done .topic-check { background:var(--green); border-color:var(--green); color:#000; font-weight:700; }
  .topic-name { font-size: 1rem; font-weight:600; flex:1; line-height:1.3; }
  .topic-date { font-size:.78rem; color:var(--muted); font-weight:500; white-space:nowrap; }
  .tap-hint { font-size:.75rem; color:var(--cyan); font-weight:600; white-space:nowrap; }

  /* ── FOCUS CARD ───────────────────────────── */
  .focus-skill-name {
    font-family:'Syne', sans-serif;
    font-size: 1.6rem; font-weight:800;
    color:var(--cyan); margin-bottom:4px; line-height:1.2;
  }
  .focus-subtitle { font-size: .95rem; color:var(--muted); font-weight:500; }
  .focus-actions { display:flex; gap:10px; margin-top:16px; flex-wrap:wrap; }

  /* ── REVISION CARD ────────────────────────── */
  .rev-items { display:flex; flex-direction:column; gap:9px; margin-top:12px; }
  .rev-item {
    display:flex; align-items:center; gap:12px;
    background:var(--orange-dim); border:1.5px solid rgba(255,152,0,.3);
    border-radius:12px; padding:13px 14px;
  }
  .rev-icon { font-size:1.3rem; flex-shrink:0; }
  .rev-text { flex:1; min-width:0; }
  .rev-name { font-size: 1rem; font-weight:700; }
  .rev-meta { font-size:.8rem; color:var(--muted); margin-top:3px; font-weight:500; }
  .rev-empty { text-align:center; color:var(--muted); font-size: .95rem; padding:14px 0; font-weight:500; }

  /* ── LOG CARD ─────────────────────────────── */
  .log-input {
    width:100%; background:var(--surface2); border:1.5px solid var(--border);
    border-radius:12px; padding:13px 15px; color:var(--text);
    font-family:'Outfit', sans-serif; font-size: 1rem; font-weight:500;
    resize:none; outline:none; min-height:76px; transition:.2s; line-height:1.5;
  }
  .log-input:focus { border-color:var(--cyan); }
  .log-input::placeholder { color:var(--muted); }

  /* ── BUTTONS ──────────────────────────────── */
  .btn {
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    padding: 12px 20px; border-radius:11px;
    font-size: 1rem; font-weight:700;
    cursor:pointer; border:none; transition:.15s;
    font-family:'Outfit', sans-serif; line-height:1;
    min-height: 44px;
  }
  .btn:active { transform:scale(.96); }
  .btn-cyan { background:var(--cyan); color:#000; }
  .btn-cyan:hover { opacity:.9; }
  .btn-ghost { background:var(--surface2); color:var(--text); border:1.5px solid var(--border); }
  .btn-ghost:hover { border-color:var(--cyan); color:var(--cyan); }
  .btn-green { background:var(--green); color:#000; }
  .btn-green:hover { opacity:.9; }
  .btn-sm { padding:9px 15px; font-size:.88rem; min-height:38px; }
  .btn-red { background: rgba(255,71,87,0.15); color:var(--red); border:1.5px solid rgba(255,71,87,0.35); }

  /* ── STATS ROW ────────────────────────────── */
  .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .stat-card {
    background:var(--surface); border:1.5px solid var(--border);
    border-radius:14px; padding:15px 10px; text-align:center;
    box-shadow: var(--card-shadow);
  }
  .stat-val {
    font-family:'Syne', sans-serif;
    font-size: 1.7rem; font-weight:800; line-height:1;
  }
  .stat-val.cyan { color:var(--cyan); }
  .stat-val.green { color:var(--green); }
  .stat-val.orange { color:var(--orange); }
  .stat-label { font-size:.8rem; color:var(--muted); margin-top:5px; font-weight:600; }

  /* ── MODAL ────────────────────────────────── */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.75); backdrop-filter:blur(5px);
    z-index:200; display:flex; align-items:flex-end; justify-content:center;
    opacity:0; pointer-events:none; transition:.25s;
  }
  @media(min-width:520px) {
    .modal-overlay { align-items:center; padding:16px; }
  }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal {
    background:var(--surface); border:1.5px solid var(--border);
    border-radius:22px 22px 0 0; padding:24px 20px 32px;
    width:100%; max-width:460px;
    transform:translateY(40px); transition:.28s cubic-bezier(.4,0,.2,1);
  }
  @media(min-width:520px) {
    .modal { border-radius:22px; padding:26px 24px; }
  }
  .modal-overlay.open .modal { transform:translateY(0); }
  .modal-handle {
    width:40px; height:4px; background:var(--border);
    border-radius:4px; margin:0 auto 18px;
  }
  @media(min-width:520px) { .modal-handle { display:none; } }
  .modal-title { font-family:'Syne',sans-serif; font-size:1.2rem; font-weight:800; margin-bottom:18px; }
  .form-group { margin-bottom:15px; }
  .form-label { font-size:.85rem; color:var(--muted); margin-bottom:7px; display:block; font-weight:700; }
  .form-input {
    width:100%; background:var(--surface2); border:1.5px solid var(--border);
    border-radius:11px; padding:12px 14px; color:var(--text);
    font-family:'Outfit', sans-serif; font-size:1rem; font-weight:500;
    outline:none; transition:.2s;
  }
  .form-input:focus { border-color:var(--cyan); }
  .modal-actions { display:flex; gap:10px; margin-top:20px; }

  /* ── LOG HISTORY ──────────────────────────── */
  .log-history { margin-top:13px; display:flex; flex-direction:column; gap:8px; max-height:190px; overflow-y:auto; }
  .log-entry {
    background:var(--surface2); border-radius:11px; padding:11px 14px;
    font-size: .95rem; font-weight:500; line-height:1.5;
  }
  .log-entry-date { color:var(--muted); font-size:.78rem; margin-bottom:3px; font-weight:600; }

  /* ── TOAST ────────────────────────────────── */
  .toast {
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(70px);
    background:var(--surface); border:1.5px solid var(--green);
    color:var(--green); padding:12px 24px; border-radius:30px;
    font-size: 1rem; font-weight:700; z-index:999; transition:.3s;
    white-space:nowrap; box-shadow:0 8px 30px rgba(0,0,0,.35);
  }
  .toast.show { transform:translateX(-50%) translateY(0); }

  /* ── MISC ─────────────────────────────────── */
  .section-head { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:0; gap:10px; }
  .section-head-count { font-size:.9rem; color:var(--muted); text-align:right; font-weight:600; white-space:nowrap; padding-top:4px; }
  .empty-state { text-align:center; color:var(--muted); font-size: .95rem; padding:22px 0; font-weight:500; line-height:1.6; }
  .more-label { font-size:.82rem; color:var(--muted); margin-top:9px; text-align:center; font-weight:600; }

  /* ── SCROLLBAR ────────────────────────────── */
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

  /* ── DESKTOP REFINEMENTS ──────────────────── */
  @media(min-width:640px) {
    .topbar { padding:16px 28px; }
    .main { padding:22px 20px 100px; gap:16px; }
    .card { padding:22px 20px; }
    .focus-skill-name { font-size:1.9rem; }
    .stat-val { font-size:2rem; }
    .topic-item { padding:15px 16px; }
  }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">Learning<span>Tracker</span></div>
  <div class="topbar-right">
    <div class="streak-pill">🔥 <span id="streakCount">0</span> day streak</div>
    <button class="theme-btn" onclick="toggleTheme()" title="Toggle theme" id="themeBtn">🌙</button>
  </div>
</div>

<div class="main">

  <!-- STATS ROW -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-val cyan" id="statSkills">0</div>
      <div class="stat-label">Skills</div>
    </div>
    <div class="stat-card">
      <div class="stat-val green" id="statTopics">0</div>
      <div class="stat-label">Done Today</div>
    </div>
    <div class="stat-card">
      <div class="stat-val orange" id="statProgress">0%</div>
      <div class="stat-label">Progress</div>
    </div>
  </div>

  <!-- CONTINUE LEARNING CARD -->
  <div class="card" id="focusCard">
    <div class="card-label"><span class="dot"></span> Continue Learning</div>
    <div id="focusContent">
      <div class="empty-state">
        No skill in focus.<br>Add a skill to get started 👇
      </div>
    </div>
    <div class="focus-actions" style="margin-top:14px;">
      <button class="btn btn-cyan" onclick="openModal('addSkill')">+ Add Skill</button>
      <button class="btn btn-ghost" onclick="openModal('manageSkills')" id="manageBtn">Manage</button>
    </div>
  </div>

  <!-- TODAY'S REVISION CARD -->
  <div class="card">
    <div class="card-label"><span class="dot orange"></span> Today's Revision</div>
    <div class="rev-items" id="revList">
      <div class="rev-empty">🎉 Nothing to revise today!</div>
    </div>
  </div>

  <!-- DAILY LOG CARD -->
  <div class="card">
    <div class="card-label"><span class="dot green"></span> Quick Log</div>
    <textarea class="log-input" id="logInput" placeholder="What did you learn today? (e.g. Learned closures in JS, practiced 3 problems)"></textarea>
    <div style="display:flex;gap:10px;margin-top:10px;">
      <button class="btn btn-green" onclick="saveLog()">Save Log ✓</button>
    </div>
    <div class="log-history" id="logHistory"></div>
  </div>

</div>

<!-- ADD SKILL MODAL -->
<div class="modal-overlay" id="modal-addSkill">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Add New Skill</div>
    <div class="form-group">
      <label class="form-label">Skill Name</label>
      <input class="form-input" id="skillNameInput" placeholder="e.g. JavaScript, DSA, React..." onkeydown="if(event.key==='Enter')document.getElementById('topicsInput').focus()">
    </div>
    <div class="form-group">
      <label class="form-label">Topics (comma separated)</label>
      <input class="form-input" id="topicsInput" placeholder="e.g. Variables, Functions, DOM, Arrays">
    </div>
    <div class="modal-actions">
      <button class="btn btn-cyan" onclick="addSkill()" style="flex:1">Add Skill</button>
      <button class="btn btn-ghost" onclick="closeModal('addSkill')">Cancel</button>
    </div>
  </div>
</div>

<!-- MANAGE SKILLS MODAL -->
<div class="modal-overlay" id="modal-manageSkills">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Your Skills</div>
    <div id="skillsList" style="display:flex;flex-direction:column;gap:8px;max-height:320px;overflow-y:auto;"></div>
    <div class="modal-actions">
      <button class="btn btn-cyan" onclick="closeModal('manageSkills');openModal('addSkill')">+ New Skill</button>
      <button class="btn btn-ghost" onclick="closeModal('manageSkills')">Close</button>
    </div>
  </div>
</div>

<!-- MARK REVISION DONE GLOBALLY -->
<div class="toast" id="toast"></div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
let state = JSON.parse(localStorage.getItem('learnflow') || '{}');
if (!state.skills) state.skills = [];
if (!state.logs) state.logs = [];
if (!state.focusSkillId) state.focusSkillId = null;
if (!state.studyDates) state.studyDates = [];
if (!state.theme) state.theme = 'dark';

function save() { localStorage.setItem('learnflow', JSON.stringify(state)); }

// ─── THEME ───────────────────────────────────────────────────────────────────
document.documentElement.setAttribute('data-theme', state.theme);
document.getElementById('themeBtn').textContent = state.theme === 'dark' ? '🌙' : '☀️';

function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', state.theme);
  document.getElementById('themeBtn').textContent = state.theme === 'dark' ? '🌙' : '☀️';
  save();
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function openModal(id) {
  if (id === 'manageSkills') renderSkillsList();
  document.getElementById('modal-' + id).classList.add('open');
}
function closeModal(id) {
  document.getElementById('modal-' + id).classList.remove('open');
}
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

// ─── ADD SKILL ───────────────────────────────────────────────────────────────
function addSkill() {
  const name = document.getElementById('skillNameInput').value.trim();
  const topicsRaw = document.getElementById('topicsInput').value.trim();
  if (!name) return showToast('Enter skill name', false);

  const topics = topicsRaw ? topicsRaw.split(',').map(t => ({
    id: Date.now() + Math.random(),
    name: t.trim(),
    done: false,
    doneDate: null,
    revisions: []
  })).filter(t => t.name) : [];

  const skill = { id: Date.now(), name, topics };
  state.skills.push(skill);
  if (!state.focusSkillId) state.focusSkillId = skill.id;
  save(); render();
  document.getElementById('skillNameInput').value = '';
  document.getElementById('topicsInput').value = '';
  closeModal('addSkill');
  showToast('Skill added! 🎯');
}

// ─── SET FOCUS ────────────────────────────────────────────────────────────────
function setFocus(id) {
  state.focusSkillId = id;
  save(); render();
  closeModal('manageSkills');
  showToast('Focus skill set! 🎯');
}

// ─── DELETE SKILL ─────────────────────────────────────────────────────────────
function deleteSkill(id) {
  if (!confirm('Delete this skill?')) return;
  state.skills = state.skills.filter(s => s.id !== id);
  if (state.focusSkillId === id) {
    state.focusSkillId = state.skills.length ? state.skills[0].id : null;
  }
  save(); render(); renderSkillsList();
}

// ─── MARK TOPIC DONE ─────────────────────────────────────────────────────────
function markTopicDone(skillId, topicId) {
  const skill = state.skills.find(s => s.id === skillId);
  const topic = skill?.topics.find(t => t.id === topicId);
  if (!topic || topic.done) return;
  topic.done = true;
  topic.doneDate = new Date().toISOString();
  // schedule revisions
  const base = new Date();
  topic.revisions = [2, 5, 10].map(d => {
    const dt = new Date(base); dt.setDate(dt.getDate() + d);
    return { daysAfter: d, date: dt.toISOString(), done: false };
  });
  // mark study today
  markStudyToday();
  save(); render();
  showToast('Topic done! ✅ Revision scheduled');
}

// ─── MARK REVISION DONE ──────────────────────────────────────────────────────
function markRevDone(skillId, topicId, revIdx) {
  const skill = state.skills.find(s => s.id === skillId);
  const topic = skill?.topics.find(t => t.id === topicId);
  if (!topic) return;
  topic.revisions[revIdx].done = true;
  markStudyToday();
  save(); render();
  showToast('Revision done! 🧠');
}

// ─── STREAK LOGIC ─────────────────────────────────────────────────────────────
function markStudyToday() {
  const today = new Date().toDateString();
  if (!state.studyDates.includes(today)) state.studyDates.push(today);
}

function calcStreak() {
  if (!state.studyDates.length) return 0;
  const sorted = [...new Set(state.studyDates)].map(d => new Date(d)).sort((a,b)=>b-a);
  let streak = 0, prev = new Date(); prev.setHours(0,0,0,0);
  for (const d of sorted) {
    const dd = new Date(d); dd.setHours(0,0,0,0);
    const diff = Math.round((prev - dd) / 86400000);
    if (diff <= 1) { streak++; prev = dd; } else break;
  }
  return streak;
}

// ─── REVISION DUE CHECK ───────────────────────────────────────────────────────
function getDueRevisions() {
  const today = new Date(); today.setHours(23,59,59,999);
  const due = [];
  state.skills.forEach(skill => {
    skill.topics.forEach(topic => {
      if (!topic.revisions) return;
      topic.revisions.forEach((rev, i) => {
        if (!rev.done && new Date(rev.date) <= today) {
          due.push({ skill, topic, revIdx: i, rev });
        }
      });
    });
  });
  return due;
}

// ─── SAVE LOG ─────────────────────────────────────────────────────────────────
function saveLog() {
  const text = document.getElementById('logInput').value.trim();
  if (!text) return showToast('Write something first!', false);
  state.logs.unshift({ text, date: new Date().toISOString() });
  if (state.logs.length > 30) state.logs = state.logs.slice(0, 30);
  markStudyToday();
  document.getElementById('logInput').value = '';
  save(); render();
  showToast('Log saved! 📝');
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function showToast(msg, success=true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = success ? 'var(--green)' : 'var(--red)';
  t.style.color = success ? 'var(--green)' : 'var(--red)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  renderStats();
  renderFocusCard();
  renderRevCard();
  renderLogHistory();
  document.getElementById('streakCount').textContent = calcStreak();
}

function renderStats() {
  document.getElementById('statSkills').textContent = state.skills.length;
  const today = new Date().toDateString();
  let doneToday = 0;
  state.skills.forEach(s => s.topics.forEach(t => {
    if (t.done && t.doneDate && new Date(t.doneDate).toDateString() === today) doneToday++;
  }));
  document.getElementById('statTopics').textContent = doneToday;
  // overall progress
  let total = 0, done = 0;
  state.skills.forEach(s => { total += s.topics.length; done += s.topics.filter(t=>t.done).length; });
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('statProgress').textContent = pct + '%';
}

function renderFocusCard() {
  const el = document.getElementById('focusContent');
  const skill = state.skills.find(s => s.id === state.focusSkillId);
  if (!skill) {
    el.innerHTML = `<div class="empty-state">No skill in focus.<br>Add a skill to get started 👇</div>`;
    return;
  }
  const done = skill.topics.filter(t=>t.done).length;
  const total = skill.topics.length;
  const pct = total ? Math.round(done/total*100) : 0;
  // find next undone topic
  const next = skill.topics.find(t => !t.done);
  
  let topicsHTML = '';
  // show max 5 topics (undone first, then done)
  const undone = skill.topics.filter(t=>!t.done).slice(0,4);
  const doneTopics = skill.topics.filter(t=>t.done).slice(-2);
  [...undone, ...doneTopics].forEach(topic => {
    const dateStr = topic.done && topic.doneDate ? new Date(topic.doneDate).toLocaleDateString('en',{month:'short',day:'numeric'}) : '';
    topicsHTML += `
      <div class="topic-item ${topic.done?'done':''}" onclick="${topic.done?'':`markTopicDone(${skill.id},${topic.id})`}">
        <div class="topic-check">${topic.done?'✓':''}</div>
        <div class="topic-name">${topic.name}</div>
        ${dateStr ? `<div class="topic-date">${dateStr}</div>` : ''}
        ${!topic.done ? '<div class="tap-hint">tap ✓</div>' : ''}
      </div>`;
  });

  el.innerHTML = `
    <div class="section-head">
      <div>
        <div class="focus-skill-name">${skill.name}</div>
        <div class="focus-subtitle">${next ? '▶ Next: ' + next.name : '🎉 All topics done!'}</div>
      </div>
      <div class="section-head-count">${done}/${total}<br>topics</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="topic-list">${topicsHTML || '<div class="empty-state">Add topics to this skill</div>'}</div>
    ${skill.topics.length > 6 ? `<div class="more-label">+${skill.topics.length-6} more topics</div>` : ''}
  `;
}

function renderRevCard() {
  const list = document.getElementById('revList');
  const due = getDueRevisions();
  if (!due.length) {
    list.innerHTML = '<div class="rev-empty">🎉 Nothing to revise today!</div>';
    return;
  }
  list.innerHTML = due.map(({skill, topic, revIdx, rev}) => {
    const labels = ['1st', '2nd', '3rd'];
    const revDate = new Date(rev.date).toLocaleDateString('en',{month:'short',day:'numeric'});
    return `
      <div class="rev-item">
        <div class="rev-icon">🧠</div>
        <div class="rev-text">
          <div class="rev-name">${topic.name}</div>
          <div class="rev-meta">${skill.name} · ${labels[revIdx]||''} revision · Due ${revDate}</div>
        </div>
        <button class="btn btn-sm btn-ghost" onclick="markRevDone(${skill.id},${topic.id},${revIdx})" style="color:var(--green);border-color:var(--green)">Done ✓</button>
      </div>`;
  }).join('');
}

function renderLogHistory() {
  const el = document.getElementById('logHistory');
  if (!state.logs.length) { el.innerHTML = ''; return; }
  el.innerHTML = state.logs.slice(0,5).map(log => `
    <div class="log-entry">
      <div class="log-entry-date">${new Date(log.date).toLocaleDateString('en',{weekday:'short',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
      <div>${log.text}</div>
    </div>`).join('');
}

function renderSkillsList() {
  const el = document.getElementById('skillsList');
  if (!state.skills.length) { el.innerHTML = '<div class="empty-state">No skills yet</div>'; return; }
  el.innerHTML = state.skills.map(skill => {
    const done = skill.topics.filter(t=>t.done).length;
    const total = skill.topics.length;
    const pct = total ? Math.round(done/total*100) : 0;
    const isFocus = skill.id === state.focusSkillId;
    return `
        <div style="background:var(--surface2);border:1.5px solid ${isFocus?'var(--cyan)':'var(--border)'};border-radius:13px;padding:13px 15px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:9px;">
          <div style="flex:1;font-weight:700;font-size:1rem;">${skill.name} ${isFocus?'<span style="font-size:.75rem;color:var(--cyan);font-weight:700;">[FOCUS]</span>':''}</div>
          <button class="btn btn-sm btn-ghost" onclick="setFocus(${skill.id})" style="${isFocus?'color:var(--cyan);border-color:var(--cyan)':''}">Focus</button>
          <button class="btn btn-sm btn-red" onclick="deleteSkill(${skill.id})">✕</button>
        </div>
        <div style="font-size:.85rem;color:var(--muted);margin-bottom:7px;font-weight:600;">${done}/${total} topics · ${pct}%</div>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>`;
  }).join('');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
